name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# yaml-language-server-disable is not allowed
enable-openid-connect: true

jobs:
  release:
    # zizmor: ignore[excessive-permissions]
    runs-on: ubuntu-24.04
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@48b6d3dd393260451050b0e6b78bc51fc483d500 # v1.58.0
        with:
          token: ${{ secrets.DOCTOR_TOKEN }}
          github_token: ${{ secrets.GH_TOKEN }}
          niks3_url: https://niks3.trev.zip
          shell: release
          fetch_depth: 0

      - name: Release to Forgejo
        run: flake-release
        env:
          REGISTRY: trev.zip
          GITHUB_TOKEN: ${{ secrets.DOCTOR_TOKEN }}
          DELETE_OLD_RELEASE_ARTIFACTS: true
